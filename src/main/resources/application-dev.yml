spring:
  config:
    import: aws-parameterstore:/chalpu-platform/dev/
    activate:
      on-profile: dev

  web:
    resources:
      add-mappings: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: jdbc:mysql://${db-host}:${db-port}/${db-name}?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: ${db-username}
    password: ${db-password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update # 프로덕션에서는 스키마를 자동으로 변경하지 않도록 validate 사용
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        default_batch_fetch_size: 20
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${kakao-client-id}
            client-secret: ${kakao-client-secret}
            redirect-uri: "https://platform.chalpu.com/api/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
              - account_email
          google:
            client-id: ${google-client-id}
            client-secret: ${google-client-secret}
            redirect-uri: "https://platform.chalpu.com/api/login/oauth2/code/google"
            authorization-grant-type: authorization_code
            scope:
              - profile
              - email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

jwt:
  secret: ${jwt-secret}
  expiration: 3600000
  refresh-token-expiration: 604800000

server:
  port: 8080
  forward-headers-strategy: native
  tomcat:
    use-relative-redirects: true

